{% extends "layouts/base.html" %}

{% block content %}

<h1>Projects</h1>
{% for project in collections.project %}
<h2>{{ project.data.title }}</h1>
<div>{{ project.data.summary }}<div>
    <a href={{ project.data.repoLink }}>Github Repository</a>
    <img src={{ project.data.image }} width="500">
{% endfor %}

{% set ctaContent = cta %}
{% include "partials/footer.html" %}

{% endblock %}
